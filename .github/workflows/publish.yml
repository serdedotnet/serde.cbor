name: publish
on:
  release:
    types: [ released ]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.*
    - name: Pack
      run: dotnet pack -c Release
    - name: NuGet login (OIDC)
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish package
      run: dotnet nuget push --skip-duplicate --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json artifacts/package/release/*.nupkg